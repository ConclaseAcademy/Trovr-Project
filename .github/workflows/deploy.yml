name: Staging Deployment Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Dynamically inserts your username to tag the image
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/trovr-frontend:staging
          build-args: |
            VITE_API_BASE_URL=${{ vars.BACKEND_URL }}
  deploy:
    needs: build-and-push # Only runs if the build succeeds!
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure Staging VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.TROVR_STAGING_VM_IP }}
          username: azureuser
          key: ${{ secrets.TROVR_STAGING_SSH_KEY }}
          script: |
            cd ~/trovr-deployment
            # pull the new image from Docker Hub, and lau
            sudo docker pull naimaomo/trovr-frontend:staging
            sudo docker-compose up -d --no-deps frontend